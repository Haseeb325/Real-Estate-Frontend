<div
  (click)="closePopup()"
  class="fixed inset-0 z-[50] backdrop-blur-sm bg-black/15 flex items-center justify-center w-full transition-opacity duration-500 ease-out overflow-y-auto p-4"
  [ngClass]="classes ? classes : ''"
>
  <div
    class="flex items-center justify-center m-auto"
    (click)="$event.stopPropagation()"
    [ngClass]="getPosition()"
    [style.--pb]="pading_bottom"
  >
    <ng-content></ng-content>
  </div>
</div>

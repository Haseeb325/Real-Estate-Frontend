<div
  class="bg-gray-900 border border-gray-800 p-6 rounded-2xl shadow-2xl w-full max-w-md mx-4 overflow-visible animate-in fade-in zoom-in duration-300"
>
  <div class="flex justify-between items-center mb-6">
    <div>
      <h2 class="text-xl font-bold text-white">Property Availability</h2>
      <p class="text-xs text-gray-400 mt-1">Set recurring weekly visiting hours</p>
    </div>
    <button
      (click)="close.emit()"
      class="text-gray-400 hover:text-white transition p-2 hover:bg-gray-800 rounded-full"
    >
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M6 18L18 6M6 6l12 12"
        ></path>
      </svg>
    </button>
  </div>

  <form [formGroup]="availabilityForm" (ngSubmit)="submit()" class="space-y-6">
    <!-- Days of Week -->
    <div class="space-y-2">
      <label class="block text-sm font-semibold text-gray-300">Days of Week</label>
      <p-multiSelect
        [options]="days"
        formControlName="days_of_week"
        optionLabel="label"
        optionValue="value"
        placeholder="Select Days"
        styleClass="w-full bg-gray-800 border-gray-700 text-white rounded-lg"
        display="chip"
        (onPanelShow)="isDropdownOpen.set(true)"
        (onPanelHide)="isDropdownOpen.set(false)"
      ></p-multiSelect>
    </div>

    <div [class.opacity-10]="isDropdownOpen()" class="space-y-6 transition-opacity duration-300 pointer-events-none" [class.pointer-events-auto]="!isDropdownOpen()">
      <!-- Time Selection -->
      <div class="grid grid-cols-2 gap-4">
        <div class="space-y-2">
          <label class="block text-sm font-semibold text-gray-300">Start Time</label>
          <p-datePicker
            formControlName="start_time"
            [timeOnly]="true"
            [hourFormat]="'24'"
            placeholder="09:00"
            styleClass="w-full bg-gray-800 border-gray-700 text-white rounded-lg"
          ></p-datePicker>
        </div>
        <div class="space-y-2">
          <label class="block text-sm font-semibold text-gray-300">End Time</label>
          <p-datePicker
            formControlName="end_time"
            [timeOnly]="true"
            [hourFormat]="'24'"
            placeholder="17:00"
            styleClass="w-full bg-gray-800 border-gray-700 text-white rounded-lg"
          ></p-datePicker>
        </div>
      </div>

      <!-- Actions -->
      <div class="flex flex-col gap-3 pt-4">
        <button
          type="submit"
          [disabled]="availabilityForm.invalid || isLoading()"
          class="w-full px-4 py-3 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 transition disabled:opacity-50 disabled:cursor-not-allowed shadow-lg shadow-blue-900/20 flex items-center justify-center gap-2"
        >
          @if (isLoading()) {
            <svg class="animate-spin h-5 w-5 text-white" fill="none" viewBox="0 0 24 24">
              <circle
                class="opacity-25"
                cx="12"
                cy="12"
                r="10"
                stroke="currentColor"
                stroke-width="4"
              ></circle>
              <path
                class="opacity-75"
                fill="currentColor"
                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
              ></path>
            </svg>
            Saving...
          } @else {
            {{ existingAvailabilityId() ? 'Update Availability' : 'Set Availability' }}
          }
        </button>

        @if (existingAvailabilityId()) {
          <button
            type="button"
            (click)="delete()"
            [disabled]="isLoading()"
            class="w-full px-4 py-3 bg-red-600/10 text-red-500 border border-red-500/20 rounded-xl font-bold hover:bg-red-600/20 transition flex items-center justify-center gap-2"
          >
            Delete Slot
          </button>
        }
      </div>
    </div>
  </form>
</div>

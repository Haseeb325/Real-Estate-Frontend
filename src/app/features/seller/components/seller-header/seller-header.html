<header class="bg-gray-900 border-b border-gray-800 px-4 md:px-8 py-4">
  <div class="max-w-7xl mx-auto flex items-center justify-between">
    <!-- Logo -->
    <div class="flex items-center gap-2">
      <div
        class="w-8 h-8 rounded-full bg-gray-700 flex items-center justify-center text-sm font-bold text-gray-400"
      >
        P
      </div>
      <span class="text-gray-500 text-xs font-semibold tracking-widest hidden sm:inline"
        >PROFIFY</span
      >
    </div>

    <!-- Navigation -->
    <nav class="flex items-center gap-2 md:gap-4 flex-wrap bg-gray-950/50 p-1.5 rounded-2xl border border-gray-800/50 backdrop-blur-md">
      <a
        [routerLink]="['/seller/dashboard']"
        routerLinkActive="bg-orange-600 text-white shadow-xl shadow-orange-900/30"
        [routerLinkActiveOptions]="{ exact: true }"
        class="text-gray-400 hover:text-gray-200 px-5 py-2.5 rounded-xl text-sm font-bold transition-all duration-300"
      >
        Dashboard
      </a>
      <a
        [routerLink]="['/seller/chats']"
        routerLinkActive="bg-orange-600 text-white shadow-xl shadow-orange-900/30"
        class="text-gray-400 hover:text-gray-200 px-5 py-2.5 rounded-xl text-sm font-bold transition-all duration-300 hidden md:inline-block"
      >
        Inquiries
      </a>
      <a
        [routerLink]="['/seller/appointments']"
        routerLinkActive="bg-orange-600 text-white shadow-xl shadow-orange-900/30"
        class="text-gray-400 hover:text-gray-200 px-5 py-2.5 rounded-xl text-sm font-bold transition-all duration-300 hidden md:inline-block"
      >
        Appointments
      </a>
      <a
        [routerLink]="['/seller/payments']"
        routerLinkActive="bg-orange-600 text-white shadow-xl shadow-orange-900/30"
        class="text-gray-400 hover:text-gray-200 px-5 py-2.5 rounded-xl text-sm font-bold transition-all duration-300 hidden md:inline-block"
      >
        Payment
      </a>
    </nav>

    <!-- User Profile -->
    <div class="flex items-center gap-3">
      <div class="hidden sm:flex flex-col items-end">
        <span class="text-gray-100 text-sm font-semibold">{{ user()?.full_name }}</span>
        <span class="text-gray-500 text-xs">{{ user()?.email }}</span>
      </div>
      <div
        (click)="showProfile = true"
        class="cursor-pointer w-10 h-10 rounded-full bg-rose-300 flex-shrink-0"
      ></div>
    </div>
  </div>
</header>

@if (showProfile) {
  <app-popup-backdrop
    [closeOnOutsideClick]="true"
    (onClose)="showProfile = false"
    layoutKey="center"
  >
    <app-seller-profile></app-seller-profile>
  </app-popup-backdrop>
}

<header class="bg-gray-900 border-b border-gray-800 px-4 md:px-8 py-4">
  <div class="max-w-7xl mx-auto flex items-center justify-between">
    <!-- Logo -->
    <div class="flex cursor-pointer items-center gap-2" routerLink="/seller/dashboard">
      <div class="mb-4 text-center justify-center items-center gap-2 flex flex-col">
        <!-- <div class="mx-auto w-14 h-14 bg-pink-400/20 rounded-full flex items-center justify-center mb-4">
        <span class="text-pink-400 font-bold text-lg">P</span> -->
        <img
          class="h-16 w-16 justify-center items-center"
          src="assets/images/propify-removebg-preview.png"
          alt=""
        />
      </div>
      <!-- <span class="text-gray-500 text-xs font-semibold tracking-widest hidden sm:inline"
        >PROPIFY</span -->
      >
    </div>

    <!-- Desktop Navigation -->
    <nav
      class="hidden md:flex items-center gap-2 md:gap-4 flex-wrap bg-gray-950/50 p-1.5 rounded-2xl border border-gray-800/50 backdrop-blur-md"
    >
      <a
        [routerLink]="['/seller/dashboard']"
        routerLinkActive="bg-orange-600 text-white shadow-xl shadow-orange-900/30"
        [routerLinkActiveOptions]="{ exact: true }"
        class="text-gray-400 hover:text-gray-200 px-5 py-2.5 rounded-xl text-sm font-bold transition-all duration-300"
      >
        Dashboard
      </a>
      <a
        [routerLink]="['/seller/chats']"
        routerLinkActive="bg-orange-600 text-white shadow-xl shadow-orange-900/30"
        class="text-gray-400 hover:text-gray-200 px-5 py-2.5 rounded-xl text-sm font-bold transition-all duration-300"
      >
        Inquiries
      </a>
      <a
        [routerLink]="['/seller/appointments']"
        routerLinkActive="bg-orange-600 text-white shadow-xl shadow-orange-900/30"
        class="text-gray-400 hover:text-gray-200 px-5 py-2.5 rounded-xl text-sm font-bold transition-all duration-300"
      >
        Appointments
      </a>
      <a
        [routerLink]="['/seller/payments']"
        routerLinkActive="bg-orange-600 text-white shadow-xl shadow-orange-900/30"
        class="text-gray-400 hover:text-gray-200 px-5 py-2.5 rounded-xl text-sm font-bold transition-all duration-300"
      >
        Payment
      </a>
    </nav>

    <!-- User Profile & Mobile Menu -->
    <div class="flex items-center gap-3">
      <div class="hidden sm:flex flex-col items-end">
        <span class="text-gray-100 text-sm font-semibold">{{ user()?.full_name }}</span>
        <span class="text-gray-500 text-xs">{{ user()?.email }}</span>
      </div>
      <div
        (click)="showProfile = true"
        class="cursor-pointer w-10 h-10 rounded-full bg-gray-700 flex-shrink-0 overflow-hidden"
      >
        @if (tempProfileImage()) {
          <img
            [src]="tempProfileImage()"
            alt="Profile"
            class="w-full h-full object-cover"
          />
        } @else if (userProfile()?.profileImage) {
          <img
            [src]="getCloudinary(userProfile()?.profileImage)"
            alt="Profile"
            class="w-full h-full object-cover"
          />
        } @else {
          <div class="w-full h-full flex items-center justify-center text-gray-400">
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
              <path
                fill-rule="evenodd"
                d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z"
                clip-rule="evenodd"
              ></path>
            </svg>
          </div>
        }
      </div>

      <!-- Mobile Menu Button -->
      <button
        (click)="toggleMobileMenu()"
        class="md:hidden p-2 rounded-lg text-gray-400 hover:text-gray-200 hover:bg-gray-800 transition-colors"
      >
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          @if (mobileMenuOpen) {
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
          } @else {
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
          }
        </svg>
      </button>
    </div>
  </div>

  <!-- Mobile Menu -->
  @if (mobileMenuOpen) {
    <nav class="md:hidden mt-4 bg-gray-950/50 p-4 rounded-2xl border border-gray-800/50 backdrop-blur-md">
      <a
        (click)="closeMobileMenu()"
        [routerLink]="['/seller/dashboard']"
        routerLinkActive="bg-orange-600 text-white shadow-xl shadow-orange-900/30"
        [routerLinkActiveOptions]="{ exact: true }"
        class="block text-gray-400 hover:text-gray-200 px-5 py-3 rounded-xl text-sm font-bold transition-all duration-300 mb-2"
      >
        Dashboard
      </a>
      <a
        (click)="closeMobileMenu()"
        [routerLink]="['/seller/chats']"
        routerLinkActive="bg-orange-600 text-white shadow-xl shadow-orange-900/30"
        class="block text-gray-400 hover:text-gray-200 px-5 py-3 rounded-xl text-sm font-bold transition-all duration-300 mb-2"
      >
        Inquiries
      </a>
      <a
        (click)="closeMobileMenu()"
        [routerLink]="['/seller/appointments']"
        routerLinkActive="bg-orange-600 text-white shadow-xl shadow-orange-900/30"
        class="block text-gray-400 hover:text-gray-200 px-5 py-3 rounded-xl text-sm font-bold transition-all duration-300 mb-2"
      >
        Appointments
      </a>
      <a
        (click)="closeMobileMenu()"
        [routerLink]="['/seller/payments']"
        routerLinkActive="bg-orange-600 text-white shadow-xl shadow-orange-900/30"
        class="block text-gray-400 hover:text-gray-200 px-5 py-3 rounded-xl text-sm font-bold transition-all duration-300"
      >
        Payment
      </a>
    </nav>
  }
</header>

@if (showProfile) {
  <app-popup-backdrop
    [closeOnOutsideClick]="true"
    (onClose)="showProfile = false"
    layoutKey="center"
  >
    <div class="bg-gray-900 rounded-lg border-4 border-blue-600 p-8 max-w-2xl w-full max-h-[90vh] overflow-y-auto relative">
      <button
        (click)="showProfile = false"
        class="absolute top-4 right-4 text-gray-400 hover:text-white transition p-1 z-10"
      >
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M6 18L18 6M6 6l12 12"
          ></path>
        </svg>
      </button>
      <app-seller-profile></app-seller-profile>
    </div>
  </app-popup-backdrop>
}

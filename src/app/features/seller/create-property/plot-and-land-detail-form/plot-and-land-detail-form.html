<div
  *ngIf="plotDetailForm"
  [formGroup]="plotDetailForm"
  class="rounded-lg border my-5 border-gray-800 bg-gray-900 p-6"
>
  <h2 class="mb-6 text-lg font-bold text-gray-100">Property features</h2>
  <p class="mb-6 text-sm text-gray-400">Structure, Parking, outdoor space and highlights.</p>

  <!-- Features Grid -->
  <div class="mb-6 grid grid-cols-1 md:grid-cols-3 gap-6">
    <!-- Property Subtype -->
    <prime-ng-select-field
      formControlName="plot_type"
      [options]="optionService.plotType()"
      placeholder="Select plot type"
      label="Plot Type"
      [showClear]="!!plotDetailForm.get('plot_type')?.dirty"
      optionValue="value"
      optionLabel="label"
    ></prime-ng-select-field>

    <prime-ng-select-field
      formControlName="permitted_use"
      [options]="optionService.plotPermittedUse()"
      placeholder="Select permitted use"
      label="Permitted Use"
      [showClear]="!!plotDetailForm.get('permitted_use')?.dirty"
      optionValue="value"
      optionLabel="label"
    ></prime-ng-select-field>
    <prime-ng-select-field
      formControlName="possession_status"
      [options]="optionService.plotPosessionStatus()"
      placeholder="Select possession status"
      label="Possession Status"
      [showClear]="!!plotDetailForm.get('possession_status')?.dirty"
      optionValue="value"
      optionLabel="label"
    ></prime-ng-select-field>
    <prime-ng-select-field
      formControlName="has_corner_plot"
      [options]="optionService.plotHasCornerPLot()"
      placeholder="Select corner plot"
      label="Corner Plot"
      [showClear]="!!plotDetailForm.get('has_corner_plot')?.dirty"
      optionValue="value"
      optionLabel="label"
    ></prime-ng-select-field>

    <primeng-input-field
      formControlName="ownership"
      placeholder="e.g 200 sqft"
      label="Ownership"
    ></primeng-input-field>
    <primeng-input-field
      formControlName="area"
      placeholder="e.g 200 sqft"
      label="Area"
    ></primeng-input-field>
    <primeng-input-field
      formControlName="frontage"
      placeholder="e.g 200 sqft"
      label="Frontage"
    ></primeng-input-field>
    <primeng-input-field
      formControlName="depth"
      placeholder="e.g 200 sqft"
      label="Depth"
    ></primeng-input-field>
    <primeng-input-field
      formControlName="facing"
      placeholder="e.g 200 sqft"
      label="Facing"
    ></primeng-input-field>
    <primeng-input-field
      formControlName="road_width"
      placeholder="e.g 200 sqft"
      label="Road Width"
    ></primeng-input-field>
    <primeng-input-field
      formControlName="approval_by"
      placeholder="e.g 200 sqft"
      label="Approval By"
    ></primeng-input-field>

    <div class="flex flex-col col-span-1 md:col-span-2">
      <div class="flex gap-2 items-center w-full md:w-1/2">
        <prime-ng-input-field
          name="newFeature"
          [(ngModel)]="newFeature"
          [ngModelOptions]="{ standalone: true }"
          placeholder="e.g gas , water"
          label="Add multiple features"
          class="w-full"
        ></prime-ng-input-field>
        <button
          type="button"
          class="whitespace-nowrap rounded-lg mt-6 bg-blue-600 px-6 py-2 text-sm font-semibold text-white transition hover:bg-blue-700"
          (click)="addFeature()"
        >
          Add
        </button>
      </div>
      <!-- Features Chips -->
      <div
        *ngIf="
          plotDetailForm.get('features')?.value && plotDetailForm.get('features')?.value.length > 0
        "
        class="flex flex-wrap gap-2 mt-4"
      >
        <div
          *ngFor="let feature of plotDetailForm.get('features')?.value; let i = index"
          class="flex items-center bg-gray-800 text-gray-100 px-3 py-1 rounded-full border border-gray-700"
        >
          {{ feature }}
          <button
            type="button"
            class="ml-2 text-gray-400 hover:text-gray-200"
            (click)="removeFeature(i)"
          >
            <i class="pi pi-times"></i>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Description Section -->
  <div class="rounded-lg border border-gray-800 bg-gray-900 p-6">
    <prime-ng-input-field
      formControlName="description"
      type="textarea"
      label="Description"
      placeholder="Describe the layout, neighborhood and what makes this property special..."
    ></prime-ng-input-field>
  </div>
</div>

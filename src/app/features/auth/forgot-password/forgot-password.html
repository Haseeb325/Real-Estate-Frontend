<div class="min-h-screen bg-[#0F172A] grid place-items-center px-4">

  <div class="w-full max-w-md text-center">

    <!-- Logo -->
    <div class="mb-10">
      <div class="mx-auto w-14 h-14 bg-pink-400/20 rounded-full flex items-center justify-center mb-4">
        <span class="text-pink-400 font-bold text-lg">P</span>
      </div>
      <h1 class="text-3xl tracking-widest text-gray-300 font-semibold">
        PROPIFY
      </h1>
    </div>

    <!-- Form -->
    <form [formGroup]="forgotPasswordForm" (ngSubmit)="submit()" class="flex flex-col gap-6">

    <app-input-field formControlName="new_password" label="Password" placeholder="21234@123" type="password" [validationMessages]="validationMessages"></app-input-field>
    <app-input-field formControlName="confirm_password"  label="Confirm Password" placeholder="21234@123" type="password"></app-input-field>

      <!-- Continue Button -->
      <button
        type="submit"
        class="w-full py-3 rounded-full bg-gradient-to-r from-purple-600 to-indigo-600 text-white font-medium text-lg hover:opacity-90 transition duration-300"
      >
        Continue
      </button>

    </form>
  </div>

</div>

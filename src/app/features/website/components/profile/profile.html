<main class="flex px-4 md:px-8 py-8">
            <div class="max-w-7xl mx-auto">
                <!-- Page Header -->
              

                <!-- Top Info Labels -->
                

                <!-- Profile Card -->
                <div class="bg-gray-900 rounded-lg border-4 border-blue-600 p-8 max-w-2xl">
                    <!-- User Header -->
                    <div class="flex items-start justify-between mb-8 pb-8 border-b border-gray-800">
                        <div class="flex items-center gap-4">
                            <div class="w-16 h-16 rounded-full bg-orange-500 flex items-center justify-center flex-shrink-0">
                                <svg class="w-8 h-8 text-white" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"></path></svg>
                            </div>
                            <div>
                                <h2 class="text-xl font-bold text-gray-100">{{user()?.username}}</h2>
                                <p class="text-gray-400 text-sm">{{user()?.email}}</p>
                            </div>
                        </div>
                        <div class="bg-gray-800 text-gray-300 px-3 py-1 rounded text-xs font-semibold border border-gray-700">Buyer account</div>
                    </div>

                    <!-- Personal Information Section -->
                    <div class="mb-8">
                        <h3 class="text-lg font-bold text-gray-100 mb-4">Personal information</h3>
                        
                        <div class="space-y-6">
                            <!-- Full Name -->
                            <div>
                                <label class="block text-gray-400 text-xs uppercase tracking-wider mb-2">Full name</label>
                                <p class="text-gray-100 text-base font-semibold">{{user()?.full_name}}</p>
                            </div>

                            <!-- Email -->
                            <div>
                                <label class="block text-gray-400 text-xs uppercase tracking-wider mb-2">Email</label>
                                <p class="text-gray-100 text-base font-semibold">{{user()?.email}}</p>
                            </div>

                            <!-- Phone -->
                            <div>
                                <label class="block text-gray-400 text-xs uppercase tracking-wider mb-2">Phone</label>
                                <p class="text-gray-100 text-base font-semibold">+1 (347) 5550183</p>
                            </div>
                        </div>
                    </div>

                    <!-- Actions Section -->
                    <div>
                        <h3 class="text-lg font-bold text-gray-100 mb-4">Actions</h3>
                        
                        <div class="flex flex-col sm:flex-row gap-3">
                            <button class="px-6 py-2 bg-gray-800 text-gray-100 rounded-lg font-semibold hover:bg-gray-700 transition border border-gray-700 text-sm">
                                Edit profile
                            </button>
                            <button class="px-6 py-2 bg-gray-800 text-gray-100 rounded-lg font-semibold hover:bg-gray-700 transition border border-gray-700 text-sm">
                                Change password
                            </button>
                            <button class="px-6 py-2 bg-orange-500 text-white rounded-lg font-semibold hover:bg-orange-600 transition text-sm">
                                Logout
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Empty Space for Responsive Layout -->
                <div class="mt-16 h-32"></div>
            </div>
        </main>

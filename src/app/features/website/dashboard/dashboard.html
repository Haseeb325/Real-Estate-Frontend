<div class="bg-gray-950 text-gray-100">
  <div class="min-h-screen flex flex-col">
    <!-- Tabs Section -->
    <div class="bg-gray-900 px-4 md:px-8 py-6 border-b border-gray-800">
      <div class="max-w-7xl mx-auto flex gap-4">
        @for (tab of tabs; track $index) {
          <button
            [routerLink]="[tab.routerLink]"
            routerLinkActive="bg-blue-600 text-white !border-blue-500 shadow-lg shadow-blue-900/20"
            [routerLinkActiveOptions]="{ exact: tab.exact }"
            class="bg-gray-800 text-gray-300 px-6 py-2 rounded-lg font-semibold hover:bg-gray-700 transition text-sm border border-gray-700"
          >
            {{ tab.label }}
          </button>
        }
      </div>
    </div>

    <!-- Child View -->
    <div class="flex-1 overflow-auto">
      <router-outlet></router-outlet>
    </div>
  </div>
</div>

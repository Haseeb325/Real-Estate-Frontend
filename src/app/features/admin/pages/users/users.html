<!-- Header -->
<header class="border-b border-gray-700 bg-gray-800 px-4 py-6 sm:px-6 lg:px-8">
  <div class="mx-auto max-w-7xl">
    <div class="flex items-center justify-between">
      <div>
        <h1 class="mb-2 text-2xl font-bold text-white sm:text-3xl">Users Management</h1>
        <p class="text-sm text-gray-400 sm:text-base">
          Manage all registered users, their roles, and account status here.
        </p>
      </div>
      <div *ngIf="isLoading()" class="flex items-center gap-2 text-blue-400">
        <i class="fas fa-circle-notch fa-spin"></i>
        <span class="text-sm">Processing...</span>
      </div>
    </div>
  </div>
</header>

<!-- Content Area -->
<div class="bg-gray-900 px-4 py-6 sm:px-6 lg:px-8">
  <div class="mx-auto max-w-7xl">
    <!-- Error Alert -->
    <div
      *ngIf="userStore.error()"
      class="mb-6 flex items-center gap-3 rounded-lg border border-red-500/50 bg-red-500/10 p-4 text-red-400"
    >
      <i class="fas fa-exclamation-triangle"></i>
      <div class="flex-1">
        <p class="text-sm font-medium">Failed to load users</p>
        <p class="text-xs opacity-80">{{ userStore.error() }}</p>
      </div>
      <button
        (click)="userStore.fetchUsers({}, true)"
        class="rounded-md bg-red-500/20 px-3 py-1 text-xs font-medium hover:bg-red-500/30 transition-colors"
      >
        Retry
      </button>
    </div>

    <!-- Data Table -->
    <app-data-table
      [data]="users"
      [columns]="columns"
      [filterConfig]="filters"
      [loading]="isLoading"
      [serverFilter]="true"
      [totalRecords]="userStore.totalCount()"
      [pageSize]="params.page_size"
      [currentPage]="params.page"
      [rowActions]="rowActions"
      (pageChange)="onPageChange($event)"
      (filterChange)="filterChanged($event)"
    >
      <!-- only add filterChange when we need server-side filtering means new fresh api call otherwise do serverfilter = false -->
    </app-data-table>
  </div>
</div>

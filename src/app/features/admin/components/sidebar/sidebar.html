<aside
  class="min-h-screen bg-gray-800 px-4 py-6 sm:w-56 sm:px-6 md:w-64 lg:w-72 border-r border-gray-700 flex flex-col"
>
  <!-- Logo Section -->
  <div class="mb-8 flex items-center gap-2">
    <i class="fas fa-icons text-xl text-blue-500"></i>
    <span class="text-lg font-bold text-white">Admin Panel</span>
  </div>

  <!-- Navigation Sections -->
  <div *ngFor="let section of menuSections" class="mb-8 last:mb-0">
    <h3 class="mb-4 text-xs font-semibold uppercase tracking-widest text-gray-400">
      {{ section.section }}
    </h3>
    <nav class="space-y-2">
      @for (item of section.items; track item.label) {
        @if (item.action && !item.route) {
          <!-- Action-only item (e.g. Logout) -->
          <button
            (click)="item.action()"
            class="flex w-full items-center gap-3 rounded-lg px-4 py-3 text-sm font-medium text-gray-400 transition hover:bg-gray-700 hover:text-white"
          >
            <i [class]="item.icon + ' w-5'"></i>
            <span>{{ item.label }}</span>
          </button>
        } @else {
          <!-- Route item -->
          <a
            [routerLink]="item.route"
            [routerLinkActive]="'bg-blue-600 text-white'"
            [routerLinkActiveOptions]="{ exact: item.exact || false }"
            class="flex items-center gap-3 rounded-lg px-4 py-3 text-sm font-medium text-gray-400 transition hover:bg-gray-700 hover:text-white"
          >
            <i [class]="item.icon + ' w-5'"></i>
            <span class="flex-1">{{ item.label }}</span>
            @if (item.label === 'Verifications' && pendingCount() > 0) {
              <span class="ml-auto flex h-5 min-w-[1.25rem] items-center justify-center rounded-full bg-red-500 px-1.5 text-[11px] font-bold text-white leading-none">
                {{ pendingCount() }}
              </span>
            }
          </a>
        }
      }
    </nav>
  </div>
</aside>
